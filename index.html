<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bloco de Notas Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --sidebar-bg: #ffffff;
            --text: #1e293b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --input-bg: #ffffff;
        }


        body.dark-mode {
            --bg: #0f172a;
            --sidebar-bg: #1e293b;
            --text: #f1f5f9;
            --card-bg: #1e293b;
            --border: #334155;
            --input-bg: #334155;
        }


        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }


        .app-container { display: flex; height: 100vh; flex-direction: row; }


        /* Mobile Responsive */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100% !important; height: auto !important; border-right: none !important; border-bottom: 1px solid var(--border); }
        }


        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            padding: 25px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }


        input, textarea {
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            outline: none;
        }


        button#btn-salvar {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }


        .main-content { flex: 1; padding: 30px; overflow-y: auto; }


        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;}


        #busca { width: 100%; max-width: 300px; margin-bottom: 0; }


        .grid-notas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }


        .card-nota {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top
